name: Build Android Release

on:
  workflow_dispatch:   # Trigger manually
  push:
    branches: [ "uat" ]

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get repo files
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Java (Gradle requires JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      # 3. Cache node modules
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('package-lock.json') }}
          restore-keys: modules-

      # 4. Install dependencies
      - name: Install dependencies
        run: npm install

      # 5. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}
          restore-keys: gradle-

      # 6. Recreate the keystore file
      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.keystore

      # 7. Add signing config to gradle.properties
      - name: Create gradle.properties
        run: |
          cat <<EOF >> android/gradle.properties
          MYAPP_UPLOAD_STORE_FILE=my-release-key.keystore
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
          EOF

      # 8. Build Release
      - name: Build Android Release
        working-directory: android
        run: |
          ./gradlew clean
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      # 9. Upload built artifacts (.apk & .aab)
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-output
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab

      # 10. Notify Slack
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": ":rocket: *Android Release Build Completed!*",
              "attachments": [
                {
                  "color": "#36a64f",
                  "title": "Download Build Artifacts",
                  "text": "APK & AAB files are now available from GitHub Actions.",
                  "footer": "Build #${{ github.run_number }}"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
