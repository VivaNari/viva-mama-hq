name: Android Release Build

on:
  push:
    branches:
      - uat
  workflow_dispatch:

jobs:
  build:
    name: Build Android Release
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Setup Java environment
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # Step 4: Install dependencies
      - name: Install npm dependencies
        run: npm ci

      # Step 5: Cache Gradle packages
      - name: Cache Gradle Wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 6: Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Step 7: Decode and setup keystore
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > android/app/viva_nari.keystore

      # Step 8: Decode google-services.json (if using Firebase)
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo $GOOGLE_SERVICES_JSON | base64 -d > android/app/google-services.json

      # Step 9: Build Release APK
      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      # Step 10: Build Release AAB (Android App Bundle)
      - name: Build Release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace

      # Step 11: List build outputs (for debugging)
      - name: List build outputs
        run: |
          echo "APK outputs:"
          ls -lah android/app/build/outputs/apk/release/
          echo "AAB outputs:"
          ls -lah android/app/build/outputs/bundle/release/

      # Step 12: Rename artifacts with version and timestamp
      - name: Rename artifacts
        run: |
          VERSION_NAME=$(grep "versionName" android/app/build.gradle | awk '{print $2}' | tr -d '"')
          VERSION_CODE=$(grep "versionCode" android/app/build.gradle | awk '{print $2}')
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          # Rename APKs
          cd android/app/build/outputs/apk/release/
          for file in *.apk; do
            if [ -f "$file" ]; then
              newname="viva_nari_v${VERSION_NAME}_${VERSION_CODE}_${TIMESTAMP}_${file}"
              mv "$file" "$newname"
            fi
          done
          
          # Rename AAB
          cd ../../bundle/release/
          for file in *.aab; do
            if [ -f "$file" ]; then
              newname="viva_nari_v${VERSION_NAME}_${VERSION_CODE}_${TIMESTAMP}_${file}"
              mv "$file" "$newname"
            fi
          done

      # Step 13: Upload APK artifacts
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Step 14: Upload AAB artifacts
      - name: Upload AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-release
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # Step 15: Upload mapping files (for crash reporting)
      - name: Upload ProGuard mapping files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mapping-files
          path: android/app/build/outputs/mapping/release/
          retention-days: 90

      # Step 16: Generate build summary
      - name: Generate Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts Generated:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "android/app/build/outputs/apk/release" ]; then
            echo "#### APK Files:" >> $GITHUB_STEP_SUMMARY
            ls -lh android/app/build/outputs/apk/release/*.apk | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -d "android/app/build/outputs/bundle/release" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### AAB Files:" >> $GITHUB_STEP_SUMMARY
            ls -lh android/app/build/outputs/bundle/release/*.aab | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          fi

      # Step 17: Cleanup keystore (security)
      - name: Cleanup Keystore
        if: always()
        run: |
          rm -f android/app/viva_nari.keystore
          rm -f android/app/google-services.json

      # Step 18: Upload build logs on failure
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android/app/build/reports/
            android/app/build/outputs/logs/
          retention-days: 7
