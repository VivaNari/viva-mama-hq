services:
    app:
        build: .
        ports:
            - "8002:8002"
        env_file:
            - .env
        environment:
            - REDIS_URL=redis://redis:6379/0
            - MONGODB_URI=***REDACTED-SECRET***
        depends_on:
            - redis
            - mongodb
        volumes:
            - .:/app
            - .local_vector_store:/app/.local_vector_store

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data

    mongodb:
        image: mongo:latest
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db

volumes:
    redis_data:
    mongo_data:
