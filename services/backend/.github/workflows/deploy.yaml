name: Deploy to Cloud Run (UAT)

on:
    workflow_dispatch:
        inputs:
            image_tag:
                description: "Docker Image Tag to Deploy"
                required: true
                default: "latest"

permissions:
    contents: read

env:
    GCP_REGION: asia-south1
    GAR_REPO: vivamama-repo
    IMAGE_NAME: vivamama-backend
    CLOUD_RUN_SERVICE: nodejs-api

jobs:
    deploy:
        name: 🚀 Deploy to Cloud Run
        runs-on: ubuntu-latest

        steps:
            # Authenticate to Google Cloud (UAT)
            - name: 🔐 Authenticate to Google Cloud (UAT)
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.UAT_GCP_SA_KEY }}

            # Setup Cloud SDK
            - name: ⚙️ Set up Cloud SDK
              uses: google-github-actions/setup-gcloud@v2

            # Set Tag
            - name: 🏷️ Set image tag
              run: echo "TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV

            # Deploy to Cloud Run
            - name: 🚀 Deploy to Cloud Run
              run: |
                  IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"
                  IMAGE_URL="${IMAGE_BASE}:${TAG}"

                  echo "Deploying image: ${IMAGE_URL}"

                  gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
                      --image="${IMAGE_URL}" \
                      --region=${{ env.GCP_REGION }} \
                      --platform=managed \
                      --project=${{ secrets.UAT_GCP_PROJECT_ID }}
