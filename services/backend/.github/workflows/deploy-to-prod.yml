name: Build, Test, Audit & Push to Google Artifact Registry

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  GCP_REGION: asia-south1
  GAR_REPO: vivamama-repo
  IMAGE_NAME: vivamama-backend

jobs:
  # --------------------------------------------------
  # JOB 1 — CHECKOUT + INSTALL + TEST + AUDIT (NO DOCKER YET)
  # --------------------------------------------------
  pre-build-checks:
    name: Install → Test → Audit (Pre-Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Audit packages (npm audit)
        run: |
          npm install -g better-npm-audit
          better-npm-audit audit
        continue-on-error: true

      - name: Check license of packages
        run: |
          npm install -g license-checker
          license-checker
        continue-on-error: true

      - name: Generate license report
        run: |
          npm install -g license-report
          license-report --output=table \
            --fields="name" \
            --fields="licensePeriod" \
            --fields="material" \
            --fields="licenseType" \
            --fields="link" \
            --fields="installedVersion" \
            --fields="remoteVersion" \
            --fields="latestRemoteVersion"
        continue-on-error: true

      - name: Run API automation tests
        run: npm run test

  # --------------------------------------------------
  # JOB 2 — MANUAL APPROVAL #1 (BEFORE DOCKER BUILD)
  # --------------------------------------------------
  approve_before_docker_build:
    name: Approve Docker Build
    needs: pre-build-checks
    runs-on: ubuntu-latest
    environment: manual-approval   # <-- Approval gate #1
    steps:
      - run: echo "Waiting for approval to start Docker build..."

  # --------------------------------------------------
  # JOB 3 — DOCKER BUILD (NO PUSH)
  # --------------------------------------------------
  build-docker-image:
    name: Build Docker Image
    needs: approve_before_docker_build
    runs-on: ubuntu-latest
    outputs:
      image_base: ${{ steps.image_tags.outputs.image_base }}
      image_tag_latest: ${{ steps.image_tags.outputs.image_tag_latest }}
      image_tag_gittag: ${{ steps.image_tags.outputs.image_tag_gittag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tags
        id: image_tags
        run: |
          IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"

          echo "image_base=${IMAGE_BASE}" >> $GITHUB_OUTPUT
          echo "image_tag_latest=${IMAGE_BASE}:latest" >> $GITHUB_OUTPUT
          echo "image_tag_gittag=${IMAGE_BASE}:${{ github.ref_name }}" >> $GITHUB_OUTPUT

          echo "📦 Prepared image tags:"
          echo "  - ${IMAGE_BASE}:${{ github.ref_name }}"
          echo "  - ${IMAGE_BASE}:latest"

      - name: Build Docker image
        run: |
          echo "🔨 Building Docker image..."
          docker build \
            -t ${{ steps.image_tags.outputs.image_tag_gittag }} \
            -t ${{ steps.image_tags.outputs.image_tag_latest }} \
            --build-arg NODE_ENV=production \
            .
          echo "✅ Docker image built successfully"

  # --------------------------------------------------
  # JOB 4 — MANUAL APPROVAL #2 (BEFORE PUSH)
  # --------------------------------------------------
  approve_before_push:
    name: Approve Push to GAR
    needs: build-docker-image
    runs-on: ubuntu-latest
    environment: manual-approval   # <-- Approval gate #2
    steps:
      - run: echo "Waiting for approval to push images to GAR..."

  # --------------------------------------------------
  # JOB 5 — PUSH TO GAR (AFTER APPROVAL)
  # --------------------------------------------------
  push-to-gar:
    name: Push to Google Artifact Registry
    needs: approve_before_push
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Push Docker image to Google Artifact Registry
        run: |
          echo "🚀 Pushing Docker images to Artifact Registry..."

          docker push ${{ needs.build-docker-image.outputs.image_tag_gittag }}
          echo "✅ Pushed: ${{ needs.build-docker-image.outputs.image_tag_gittag }}"

          docker push ${{ needs.build-docker-image.outputs.image_tag_latest }}
          echo "✅ Pushed: ${{ needs.build-docker-image.outputs.image_tag_latest }}"

      - name: Verify image in Artifact Registry
        run: |
          echo "🔍 Verifying image in Artifact Registry..."
          gcloud artifacts docker images list \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }} \
            --include-tags \
            --filter="package=${{ env.IMAGE_NAME }}" \
            --format="table(package,version,CREATE_TIME,UPDATE_TIME)" \
            --limit=5

      - name: 📊 Deployment Summary
        if: success()
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "✅ DOCKER IMAGE PUSHED SUCCESSFULLY!"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "🏷️  Tags Pushed:"
          echo "  - ${{ github.ref_name }}"
          echo "  - latest"
          echo ""
          echo "🔗 Full Image Paths:"
          echo "  ${{ needs.build-docker-image.outputs.image_tag_gittag }}"
          echo "  ${{ needs.build-docker-image.outputs.image_tag_latest }}"
          echo ""
          echo "════════════════════════════════════════════════════════════════"
