name: Build → Approve → Build Docker → Approve → Push GAR

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  GCP_REGION: asia-south1
  GAR_REPO: vivamama-repo
  IMAGE_NAME: vivamama-backend

jobs:
  # --------------------------------------------------
  # JOB 1 — TESTS & AUDITS
  # --------------------------------------------------
  tests-and-audit:
    name: Install → Test → Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci --legacy-peer-deps

      - name: npm audit
        run: |
          npm install -g better-npm-audit
          better-npm-audit audit
        continue-on-error: true

      - name: Run API tests
        run: npm run test

  # --------------------------------------------------
  # MANUAL APPROVAL #1 — BEFORE DOCKER BUILD
  # --------------------------------------------------
  approve-before-build:
    name: Manual Approval → Start Docker Build
    needs: tests-and-audit
    runs-on: ubuntu-latest

    steps:
      - name: Wait for manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: rahul-qbit   # <-- CHANGE TO YOUR GITHUB USERNAME
          minimum-approvals: 1
          issue-title: "Approve Docker Build for ${{ github.ref_name }}"
          issue-body: |
            Tests & audits completed.
            Please approve to start Docker build.

  # --------------------------------------------------
  # JOB 3 — BUILD DOCKER IMAGE (NO PUSH YET)
  # --------------------------------------------------
  build-docker-image:
    name: Build Docker Image
    needs: approve-before-build
    runs-on: ubuntu-latest
    outputs:
      image_tag_gittag: ${{ steps.image_tags.outputs.image_tag_gittag }}
      image_tag_latest: ${{ steps.image_tags.outputs.image_tag_latest }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tags
        id: image_tags
        run: |
          IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"

          echo "image_tag_gittag=${IMAGE_BASE}:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "image_tag_latest=${IMAGE_BASE}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.image_tags.outputs.image_tag_gittag }} \
            -t ${{ steps.image_tags.outputs.image_tag_latest }} \
            --build-arg NODE_ENV=production \
            .

  # --------------------------------------------------
  # MANUAL APPROVAL #2 — BEFORE PUSH
  # --------------------------------------------------
  approve-before-push:
    name: Manual Approval → Push to GAR
    needs: build-docker-image
    runs-on: ubuntu-latest

    steps:
      - name: Wait for manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: rahul-dutta   # <-- CHANGE TO YOUR GITHUB USERNAME
          minimum-approvals: 1
          issue-title: "Approve GAR Push for ${{ github.ref_name }}"
          issue-body: |
            Docker image built successfully.
            Please approve to push to Google Artifact Registry.

  # --------------------------------------------------
  # JOB 5 — PUSH TO GAR (AFTER APPROVAL)
  # --------------------------------------------------
  push-to-gar:
    name: Push to Google Artifact Registry
    needs: approve-before-push
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Push Docker image
        run: |
          IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"

          docker push ${IMAGE_BASE}:${{ github.ref_name }}
          docker push ${IMAGE_BASE}:latest
