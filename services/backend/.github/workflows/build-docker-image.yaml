name: Build Docker Image

on:
    workflow_dispatch:
        inputs:
            image_tag:
                description: "Docker Image Tag (example: v1.0.0 or latest)"
                required: true
                default: "latest"

permissions:
    contents: read

env:
    GCP_REGION: asia-south1
    GAR_REPO: vivamama-repo
    IMAGE_NAME: vivamama-backend

jobs:
    build-docker-image:
        name: 🔨 Build & Push Docker Image
        runs-on: ubuntu-latest

        steps:
            # Checkout
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            # Auth GCP
            - name: 🔐 Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.UAT_GCP_SA_KEY }}

            # Setup gcloud
            - name: ⚙️ Set up Cloud SDK
              uses: google-github-actions/setup-gcloud@v2

            # Docker Auth
            - name: 🐳 Configure Docker authentication
              run: |
                  gcloud config set project ${{ secrets.PROD_GCP_PROJECT_ID }}
                  gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

            # Set Tag
            - name: 🏷️ Set image tag
              run: echo "TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV

            # Build Image
            - name: 🔨 Build Docker image
              run: |
                  IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"

                  docker build \
                    -t "${IMAGE_BASE}:${TAG}" \
                    --build-arg NODE_ENV=production \
                    .

            # Push Image
            - name: 📤 Push Docker image to Artifact Registry
              run: |
                  IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"

                  echo "Pushing version tag..."
                  docker push "${IMAGE_BASE}:${TAG}"

                  echo "Tagging latest..."
                  docker tag "${IMAGE_BASE}:${TAG}" "${IMAGE_BASE}:latest"

                  echo "Pushing latest..."
                  docker push "${IMAGE_BASE}:latest"
