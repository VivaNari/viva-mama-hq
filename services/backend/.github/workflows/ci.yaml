name: Install, Tests & Audit

on:
    pull_request:
        branches:
            - main
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: read

jobs:
    tests-and-audit:
        name: 🧪 Install → Test → Audit
        runs-on: ubuntu-latest

        steps:
            # Checkout Source Code
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            # Setup Node.js
            - name: ⚙️ Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            # Install Dependencies
            - name: 📦 Install dependencies
              run: npm ci --legacy-peer-deps

            # NPM Audit
            - name: Audit packages (npm audit)
              run: |
                  npm install -g better-npm-audit
                  better-npm-audit audit
              continue-on-error: true

            # License Checker
            - name: Check license of packages
              run: |
                  npm install -g license-checker
                  license-checker
              continue-on-error: true

            # License Report
            - name: Generate license report
              run: |
                  npm install -g license-report
                  license-report --output=table \
                    --fields="name" \
                    --fields="licensePeriod" \
                    --fields="material" \
                    --fields="licenseType" \
                    --fields="link" \
                    --fields="installedVersion" \
                    --fields="remoteVersion" \
                    --fields="latestRemoteVersion"
              continue-on-error: true

            # Run Tests
            - name: Run API automation tests
              run: npm run test
