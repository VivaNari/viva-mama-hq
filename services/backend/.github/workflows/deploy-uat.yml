name: Build, Test, Audit & Push Docker

on:
  push:
    branches:
      - uat
  workflow_dispatch:

env:
  DOCKER_REPOSITORY: vivamama-backend

jobs:
  build-and-push:
    name: Build → Test → Audit → Docker Push
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # Checkout Source Code
      # -------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------
      # Setup Node.js
      # -------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------------------------------
      # Install dependencies
      # -------------------------------
      - name: Install dependencies
        run: npm ci

      # -------------------------------
      # NPM Audit
      # -------------------------------
      - name: Audit packages (npm audit)
        run: |
          npm install -g better-npm-audit
          better-npm-audit audit

      # -------------------------------
      # License Checker
      # -------------------------------
      - name: Check license of packages
        run: |
          npm install -g license-checker
          license-checker

      # -------------------------------
      # License Report
      # -------------------------------
      - name: Generate license report
        run: |
          npm install -g license-report
          license-report --output=table \
            --fields="name" \
            --fields="licensePeriod" \
            --fields="material" \
            --fields="licenseType" \
            --fields="link" \
            --fields="installedVersion" \
            --fields="remoteVersion" \
            --fields="latestRemoteVersion"

      # -------------------------------
      # Lint & Format Checks
      # -------------------------------
      - name: Run Code Lint
        run: npm run lint

      - name: Run Format Check
        run: npm run format:check

      # -------------------------------
      # API Automation Tests
      # -------------------------------
      - name: Run API automation tests
        run: npm run test

      # -------------------------------
      # Docker Login (Docker Hub)
      # -------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------------
      # Docker Build
      # -------------------------------
      - name: Build Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:$IMAGE_TAG .

      # -------------------------------
      # Trivy Vulnerability Scan
      # -------------------------------
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1" # FAIL pipeline if critical/high vulnerabilities found

      # -------------------------------
      # Push Docker Image (only if Trivy passes)
      # -------------------------------
      - name: Push Docker image to Docker Hub
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:$IMAGE_TAG
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:$IMAGE_TAG \
            ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:latest

      # -------------------------------
      # Deployment Summary
      # -------------------------------
      - name: Deployment Summary
        run: |
          echo "🚀 Docker image pushed successfully!"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPOSITORY:${{ github.sha }}"
