name: Deploy to UAT Environment

on:
    # pull_request:
    #     branches:
    #         - "main"
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:

permissions:
    contents: read

env:
    GCP_REGION: asia-south1
    GAR_REPO: vivamama-repo
    IMAGE_NAME: vivamama-backend
    CLOUD_RUN_SERVICE: nodejs-api

jobs:
    # ════════════════════════════════════════════════════════════════
    # JOB 1: RUN TESTS AND SECURITY AUDITS
    # ════════════════════════════════════════════════════════════════
    tests-and-audit:
        name: 🧪 Install → Test → Audit
        runs-on: ubuntu-latest

        steps:
            # -------------------------------
            # Checkout Source Code
            # -------------------------------
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            # -------------------------------
            # Setup Node.js Environment
            # -------------------------------
            - name: ⚙️ Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            # -------------------------------
            # Install Dependencies
            # -------------------------------
            - name: 📦 Install dependencies
              run: npm ci --legacy-peer-deps

            # -------------------------------
            # NPM Audit
            # -------------------------------
            - name: Audit packages (npm audit)
              run: |
                  npm install -g better-npm-audit
                  better-npm-audit audit
              continue-on-error: true # Don't fail build on audit warnings

            # -------------------------------
            # License Checker
            # -------------------------------
            - name: Check license of packages
              run: |
                  npm install -g license-checker
                  license-checker
              continue-on-error: true

            # -------------------------------
            # License Report
            # -------------------------------
            - name: Generate license report
              run: |
                  npm install -g license-report
                  license-report --output=table \
                    --fields="name" \
                    --fields="licensePeriod" \
                    --fields="material" \
                    --fields="licenseType" \
                    --fields="link" \
                    --fields="installedVersion" \
                    --fields="remoteVersion" \
                    --fields="latestRemoteVersion"
              continue-on-error: true

            # -------------------------------
            # Lint & Format Checks
            # -------------------------------
            # Uncomment when lint and format scripts are ready
            # - name: Run Code Lint
            #   run: npm run lint

            # - name: Run Format Check
            #   run: npm run format:check

            # -------------------------------
            # API Automation Tests
            # -------------------------------
            - name: Run API automation tests
              run: npm run test

    # ════════════════════════════════════════════════════════════════
    # JOB 3: BUILD DOCKER IMAGE
    # ════════════════════════════════════════════════════════════════
    build-docker-image:
        name: 🔨 Build Docker Image
        needs: tests-and-audit
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.image_tags.outputs.tag }}

        steps:
            # -------------------------------
            # Checkout Source Code
            # -------------------------------
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            # -------------------------------
            # Authenticate to Google Cloud (UAT credentials with PROD access)
            # -------------------------------
            - name: 🔐 Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.UAT_GCP_SA_KEY }}

            # -------------------------------
            # Setup Cloud SDK
            # -------------------------------
            - name: ⚙️ Set up Cloud SDK
              uses: google-github-actions/setup-gcloud@v2

            # -------------------------------
            # Configure Docker Authentication
            # -------------------------------
            - name: 🐳 Configure Docker authentication for Artifact Registry
              run: |
                  # Set the project explicitly before configuring docker
                  gcloud config set project ${{ secrets.PROD_GCP_PROJECT_ID }}

                  # Configure docker auth
                  gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

                  # Verify authentication
                  echo "Current project: $(gcloud config get-value project)"
                  echo "Current account: $(gcloud config get-value account)"

            # -------------------------------
            # Set Image Tags
            # -------------------------------
            - name: 🏷️ Set image tags
              id: image_tags
              run: |
                  if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                    TAG="pr-${{ github.event.pull_request.number }}"
                  elif [[ "${{ github.ref_type }}" == "tag" ]]; then
                    TAG="${{ github.ref_name }}"
                  else
                    TAG="latest"
                  fi

                  IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"

                  # Save only the TAG to outputs, not the full path with secrets
                  echo "tag=${TAG}" >> $GITHUB_OUTPUT

                  echo "📦 Image will be tagged as:"
                  echo "  - ${IMAGE_BASE}:${TAG}"
                  echo "  - ${IMAGE_BASE}:latest"

            # -------------------------------
            # Build Docker Image
            # -------------------------------
            - name: 🔨 Build Docker image
              run: |
                  IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"
                  TAG="${{ steps.image_tags.outputs.tag }}"

                  echo "🔨 Building Docker image..."
                  docker build \
                    -t "${IMAGE_BASE}:${TAG}" \
                    --build-arg NODE_ENV=production \
                    .
                  echo "✅ Docker image built successfully"

            # -------------------------------
            # Save Docker Image as Artifact
            # -------------------------------
            - name: 💾 Save Docker image to file
              run: |
                  IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"
                  TAG="${{ steps.image_tags.outputs.tag }}"

                  echo "💾 Saving Docker image to tar file..."
                  docker save "${IMAGE_BASE}:${TAG}" -o /tmp/docker-image.tar
                  echo "✅ Image saved successfully"
                  ls -lh /tmp/docker-image.tar

            # -------------------------------
            # Upload Docker Image Artifact
            # -------------------------------
            - name: 📤 Upload Docker image artifact
              uses: actions/upload-artifact@v4
              with:
                  name: docker-image
                  path: /tmp/docker-image.tar
                  retention-days: 1
                  compression-level: 0 # Image is already compressed

    # ════════════════════════════════════════════════════════════════
    # JOB 5: PUSH DOCKER IMAGE TO ARTIFACT REGISTRY (PROD)
    # ════════════════════════════════════════════════════════════════
    push-to-gar:
        name: 📤 Push to Google Artifact Registry
        needs: [build-docker-image]
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ needs.build-docker-image.outputs.tag }}

        steps:
            # -------------------------------
            # Authenticate to Google Cloud (UAT credentials with PROD access)
            # -------------------------------
            - name: 🔐 Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.UAT_GCP_SA_KEY }}

            # -------------------------------
            # Setup Cloud SDK
            # -------------------------------
            - name: ⚙️ Set up Cloud SDK
              uses: google-github-actions/setup-gcloud@v2

            # -------------------------------
            # Configure Docker Authentication
            # -------------------------------
            - name: 🐳 Configure Docker authentication
              run: |
                  # Set the project explicitly before configuring docker
                  gcloud config set project ${{ secrets.PROD_GCP_PROJECT_ID }}

                  # Configure docker auth
                  gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

                  # Verify authentication
                  echo "Current project: $(gcloud config get-value project)"
                  echo "Current account: $(gcloud config get-value account)"

            # -------------------------------
            # Download Docker Image Artifact
            # -------------------------------
            - name: 📥 Download Docker image artifact
              uses: actions/download-artifact@v4
              with:
                  name: docker-image
                  path: /tmp

            # -------------------------------
            # Load and Push Docker Image
            # -------------------------------
            - name: 🔄 Load, tag, and push Docker image
              run: |
                  IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"
                  TAG="${{ needs.build-docker-image.outputs.tag }}"

                  # Verify repository is accessible
                  echo "🔍 Verifying repository access..."
                  gcloud artifacts repositories describe ${{ env.GAR_REPO }} \
                    --location=${{ env.GCP_REGION }} \
                    --project=${{ secrets.PROD_GCP_PROJECT_ID }}
                  echo "✅ Repository is accessible"
                  echo ""

                  echo "🔄 Loading Docker image from tar file..."
                  ls -lh /tmp/docker-image.tar
                  docker load -i /tmp/docker-image.tar
                  echo "✅ Image loaded successfully"
                  echo ""

                  echo "📋 Loaded image:"
                  docker images | grep ${{ env.IMAGE_NAME }} || true
                  echo ""

                  echo "🏷️ Tagging image with latest..."
                  docker tag "${IMAGE_BASE}:${TAG}" "${IMAGE_BASE}:latest"
                  echo "✅ Tagged successfully"
                  echo ""

                  echo "📋 Current tags:"
                  docker images | grep ${{ env.IMAGE_NAME }}
                  echo ""

                  echo "📤 Pushing images to Artifact Registry..."
                  echo "Pushing version tag: ${IMAGE_BASE}:${TAG}"
                  docker push "${IMAGE_BASE}:${TAG}"
                  echo "✅ Pushed version tag"
                  echo ""

                  echo "Pushing latest tag: ${IMAGE_BASE}:latest"
                  docker push "${IMAGE_BASE}:latest"
                  echo "✅ Pushed latest tag"

            # -------------------------------
            # Verify Image in Registry
            # -------------------------------
            - name: 🔍 Verify image in Artifact Registry
              run: |
                  echo "🔍 Verifying pushed images..."
                  gcloud artifacts docker images list \
                    ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/${{ env.GAR_REPO }} \
                    --include-tags \
                    --filter="package=${{ env.IMAGE_NAME }}" \
                    --format="table(package,version,CREATE_TIME,UPDATE_TIME)" \
                    --limit=5

    # ════════════════════════════════════════════════════════════════
    # JOB 6: DEPLOY TO CLOUD RUN (UAT)
    # ════════════════════════════════════════════════════════════════
    deploy-to-cloud-run:
        name: 🚀 Deploy to Cloud Run (UAT)
        needs: push-to-gar
        runs-on: ubuntu-latest

        steps:
            # -------------------------------
            # Authenticate to Google Cloud (UAT)
            # -------------------------------
            - name: 🔐 Authenticate to Google Cloud (UAT)
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.UAT_GCP_SA_KEY }}

            # -------------------------------
            # Setup Cloud SDK
            # -------------------------------
            - name: ⚙️ Set up Cloud SDK
              uses: google-github-actions/setup-gcloud@v2

            # -------------------------------
            # Deploy to Cloud Run
            # -------------------------------
            - name: 🚀 Deploy to Cloud Run
              run: |
                  IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"
                  TAG="${{ needs.push-to-gar.outputs.tag }}"
                  IMAGE_URL="${IMAGE_BASE}:${TAG}"

                  echo "🚀 Deploying to Cloud Run..."
                  echo "Image: ${IMAGE_URL}"
                  gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
                    --image="${IMAGE_URL}" \
                    --region=${{ env.GCP_REGION }} \
                    --platform=managed \
                    --project=${{ secrets.UAT_GCP_PROJECT_ID }}
                  echo "✅ Deployment initiated successfully"

            # -------------------------------
            # Get Service URL
            # -------------------------------
            - name: 🔗 Get Cloud Run service URL
              id: get_url
              run: |
                  URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
                    --region=${{ env.GCP_REGION }} \
                    --project=${{ secrets.UAT_GCP_PROJECT_ID }} \
                    --format='value(status.url)')
                  echo "service_url=$URL" >> $GITHUB_OUTPUT
                  echo "🌐 Service URL: $URL"

            # -------------------------------
            # Deployment Summary
            # -------------------------------
            - name: 📊 Create deployment summary
              run: |
                  IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"
                  TAG="${{ needs.push-to-gar.outputs.tag }}"
                  IMAGE_URL="${IMAGE_BASE}:${TAG}"

                  echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### 📋 Deployment Details" >> $GITHUB_STEP_SUMMARY
                  echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
                  echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
                  echo "| **Environment** | UAT |" >> $GITHUB_STEP_SUMMARY
                  echo "| **Version** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| **Service** | \`${{ env.CLOUD_RUN_SERVICE }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| **Region** | \`${{ env.GCP_REGION }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| **Image** | \`${IMAGE_URL}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| **Service URL** | ${{ steps.get_url.outputs.service_url }} |" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### ✅ Next Steps" >> $GITHUB_STEP_SUMMARY
                  echo "- Test the deployment at: ${{ steps.get_url.outputs.service_url }}" >> $GITHUB_STEP_SUMMARY
                  echo "- Monitor logs: \`gcloud run logs tail ${{ env.CLOUD_RUN_SERVICE }} --project=${{ secrets.UAT_GCP_PROJECT_ID }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- Check metrics in Cloud Console" >> $GITHUB_STEP_SUMMARY

            # -------------------------------
            # Console Output
            # -------------------------------
            - name: 🎉 Deployment complete
              run: |
                  IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"
                  TAG="${{ needs.push-to-gar.outputs.tag }}"
                  IMAGE_URL="${IMAGE_BASE}:${TAG}"

                  echo "════════════════════════════════════════════════════════════════"
                  echo "✅ DEPLOYMENT TO UAT SUCCESSFUL!"
                  echo "════════════════════════════════════════════════════════════════"
                  echo ""
                  echo "🌐 Service URL: ${{ steps.get_url.outputs.service_url }}"
                  echo "📦 Image: ${IMAGE_URL}"
                  echo "🏷️  Version: ${{ github.ref_name }}"
                  echo ""
                  echo "════════════════════════════════════════════════════════════════"

    # ════════════════════════════════════════════════════════════════
    # JOB 7: CLEANUP (RUNS ALWAYS)
    # ════════════════════════════════════════════════════════════════
    cleanup:
        name: 🧹 Cleanup
        needs: [deploy-to-cloud-run]
        runs-on: ubuntu-latest
        if: always()

        steps:
            # -------------------------------
            # Workflow Summary
            # -------------------------------
            - name: 📝 Workflow summary
              run: |
                  if [ "${{ needs.deploy-to-cloud-run.result }}" == "success" ]; then
                    echo "✅ UAT deployment completed successfully"
                  else
                    echo "❌ UAT deployment failed or was cancelled"
                    echo "Please check the logs above for details"
                  fi
