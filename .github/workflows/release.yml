name: Release

# Opens/updates a "Version Packages" PR from accumulated changesets. Packages are
# not published to a registry (access is "restricted"); merging the PR bumps
# versions and updates per-package CHANGELOGs.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create or update the Version Packages PR
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
