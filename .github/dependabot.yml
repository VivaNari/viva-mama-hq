version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    groups:
      js-dev-dependencies:
        dependency-type: development
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: '/services/chatbot'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directories:
      - '/services/backend'
      - '/services/chatbot'
    schedule:
      interval: weekly
